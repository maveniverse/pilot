name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Run release drafter
        id: drafter
        uses: release-drafter/release-drafter@a6a982fee9675c45c1765e9fa5308f7d6c3ecbd4 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Java
        if: github.event_name == 'push'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Sync draft release version with build
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -DforceStdout -B -q -N)
          RELEASE_VERSION=${VERSION%-SNAPSHOT}
          echo "Build version: $VERSION -> Release version: $RELEASE_VERSION"
          gh api repos/${{ github.repository }}/releases/${{ steps.drafter.outputs.id }} \
            -X PATCH \
            -f name="$RELEASE_VERSION" \
            -f tag_name="$RELEASE_VERSION"
