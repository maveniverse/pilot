name: Deploy Snapshots

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  snapshot:
    name: Deploy snapshot to OSSRH
    runs-on: ubuntu-latest
    # Skip snapshot deployment for Dependabot PRs
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Check if SNAPSHOT version
        id: check
        run: |
          version=$(./mvnw -B help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Resolved version: $version"
          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy snapshot
        if: steps.check.outputs.is_snapshot == 'true'
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          ./mvnw -B deploy -DskipTests -Dgpg.skip=true -Denforcer.skip=true -Dnjord.autoPublish -Pmaveniverse-release -s .github/release-settings.xml
